name: SPA tests

# SPA-side CI: typecheck, lint, vitest, production build.
# Typecheck is now ENFORCED — the legacy Sprint 1/2 type errors were cleared,
# so `tsc --noEmit` is clean and any NEW type error blocks the PR. Lint stays
# advisory (pre-existing no-explicit-any debt). Vitest + build are enforced.

on:
  pull_request:
    paths:
      - 'spa/**'
      - '.github/workflows/spa-tests.yml'
  push:
    branches: [main]
    paths:
      - 'spa/**'

permissions:
  contents: read

jobs:
  vitest:
    name: Typecheck · Lint · Vitest · Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: spa

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: spa/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint (advisory)
        continue-on-error: true
        run: npm run lint

      - name: Typecheck (enforced)
        run: npm run typecheck

      - name: Vitest
        env:
          CI: 'true'
        # --passWithNoTests so a clean tree (no specs yet on a sub-tree) is not a failure;
        # vitest still exits non-zero on any actual failed assertion.
        run: npm test -- --run --passWithNoTests

      - name: Production build (vite, skipping tsc)
        # `npm run build` does `tsc -b && vite build`, which trips on
        # pre-existing Sprint 1/2 type debt enumerated in the Sprint 8 plan.
        # The actual production bundle is what `vite build` produces — tsc is
        # only a typecheck. We surface tsc errors via the advisory `typecheck`
        # step above and let the build prove the bundle ships.
        run: npx vite build
