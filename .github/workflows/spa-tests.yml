name: SPA tests

# Sprint 8 — Task 81. SPA-side CI: typecheck, lint, vitest, production build.
# Existing pre-Sprint-8 type errors and lint warnings are baseline-grandfathered
# via continue-on-error on lint/typecheck so this workflow surfaces NEW
# regressions without blocking the PR on the legacy debt. Vitest + build are
# enforced.

on:
  pull_request:
    paths:
      - 'spa/**'
      - '.github/workflows/spa-tests.yml'
  push:
    branches: [main]
    paths:
      - 'spa/**'

permissions:
  contents: read

jobs:
  vitest:
    name: Typecheck · Lint · Vitest · Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: spa

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: spa/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint (advisory)
        continue-on-error: true
        run: npm run lint

      - name: Typecheck (advisory)
        continue-on-error: true
        run: npm run typecheck

      - name: Vitest
        env:
          CI: 'true'
        # --passWithNoTests so a clean tree (no specs yet on a sub-tree) is not a failure;
        # vitest still exits non-zero on any actual failed assertion.
        run: npm test -- --run --passWithNoTests

      - name: Production build
        run: npm run build
