# ─── Ogami ERP — Production Compose ───────────────────────────────────────
# Used on the production VPS (DigitalOcean droplet, Ubuntu 22.04 LTS).
# Differences vs docker-compose.yml (dev):
#   • SPA is built into static files at deploy time, then mounted into nginx
#     (no Vite dev server, no HMR).
#   • API uses Dockerfile.prod (multi-stage, --no-dev, opcache enabled).
#   • Nginx terminates TLS via Let's Encrypt certs mounted from the host.
#   • All database/redis/meilisearch ports stay internal-only.
#   • mailpit removed; SMTP comes from real provider via env.
#
# Deploy: see docs/DEPLOY.md.
# ────────────────────────────────────────────────────────────────────────────

services:
  api:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    container_name: ogami-api
    restart: unless-stopped
    working_dir: /var/www
    env_file: .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks: [ogami-net]

  nginx:
    image: nginx:1.27-alpine
    container_name: ogami-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      # SPA static build (produced by `make build-spa` / Makefile target).
      - ./spa/dist:/var/www/spa:ro
      # Let's Encrypt certs — provisioned on the host with certbot.
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - api
    networks: [ogami-net]

  db:
    image: postgres:16-alpine
    container_name: ogami-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks: [ogami-net]

  redis:
    image: redis:7-alpine
    container_name: ogami-redis
    restart: unless-stopped
    volumes:
      - redisdata:/data
    networks: [ogami-net]

  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: ogami-meili
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY}
      MEILI_NO_ANALYTICS: "true"
      MEILI_ENV: production
    volumes:
      - meilidata:/meili_data
    networks: [ogami-net]

  reverb:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    container_name: ogami-reverb
    restart: unless-stopped
    working_dir: /var/www
    env_file: .env
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    depends_on:
      - api
    networks: [ogami-net]

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    container_name: ogami-queue
    restart: unless-stopped
    working_dir: /var/www
    env_file: .env
    command: php artisan queue:work --tries=3 --timeout=120 --sleep=3
    depends_on:
      - api
      - redis
    networks: [ogami-net]

networks:
  ogami-net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  meilidata:
