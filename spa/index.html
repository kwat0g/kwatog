<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Ogami ERP — Manufacturing operations for Philippine Ogami Corporation" />
    <!--
      Canonical CSP is enforced via nginx headers. This meta tag is defense-in-depth
      for misconfigured static hosting / dev servers. It intentionally omits
      frame-ancestors (only valid in headers) and matches the prod nginx policy.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob:; connect-src 'self' ws: wss:;"
    />

    <!-- Geist + Geist Mono — self-hosted fonts (woff2) for production independence. -->

    <!-- T2.5 — Driver PWA (Add to Home Screen for iOS + Android) -->
    <link rel="manifest" href="/driver-manifest.webmanifest" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="OGAMI Driver" />
    <link rel="apple-touch-icon" href="/driver-icon-192.png" />

    <title>Ogami ERP</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
