services:
  api:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ogami-api
    working_dir: /var/www
    volumes:
      - ./api:/var/www
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-true}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks: [ogami-net]

  spa:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    container_name: ogami-spa
    working_dir: /app
    volumes:
      - ./spa:/app
      - spa_node_modules:/app/node_modules
    environment:
      # Forwarded so vite.config.ts can rewire HMR through the Nginx proxy.
      - VITE_HMR_HOST=${VITE_HMR_HOST:-localhost}
      - VITE_HMR_PORT=${NGINX_PORT:-80}
      - NGINX_PORT=${NGINX_PORT:-80}
      # Reverb / WebSocket — must match REVERB_APP_KEY in the API .env.
      # Host blank => browser uses its own hostname; port must match
      # REVERB_HOST_PORT below since pusher-js cannot use a path prefix.
      - VITE_REVERB_APP_KEY=${REVERB_APP_KEY:-ogami_reverb}
      - VITE_REVERB_HOST=${VITE_REVERB_HOST:-}
      - VITE_REVERB_PORT=${VITE_REVERB_PORT:-${REVERB_HOST_PORT:-8080}}
      - VITE_REVERB_SCHEME=${VITE_REVERB_SCHEME:-http}
    command: sh -c "npm install --no-audit --no-fund && npm run dev -- --host 0.0.0.0"
    networks: [ogami-net]

  nginx:
    image: nginx:1.27-alpine
    container_name: ogami-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./api:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - spa
      - reverb
    networks: [ogami-net]

  db:
    image: postgres:16-alpine
    container_name: ogami-db
    environment:
      POSTGRES_DB: ${DB_DATABASE:-ogami}
      POSTGRES_USER: ${DB_USERNAME:-ogami}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ogami_dev_pw}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-ogami}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [ogami-net]

  redis:
    image: redis:7-alpine
    container_name: ogami-redis
    volumes:
      - redisdata:/data
    networks: [ogami-net]

  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: ogami-meili
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY:-ogami_meili_dev}
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meilidata:/meili_data
    networks: [ogami-net]

  reverb:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ogami-reverb
    working_dir: /var/www
    volumes:
      - ./api:/var/www
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      # Browser connects directly via ws://<host>:8080/app/<key>.
      # pusher-js does not support a path prefix, so we cannot proxy
      # this through Nginx — the Reverb port must be reachable.
      - "${REVERB_HOST_PORT:-8080}:8080"
    depends_on:
      - api
    networks: [ogami-net]

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ogami-queue
    working_dir: /var/www
    volumes:
      - ./api:/var/www
    command: php artisan queue:work --tries=3 --timeout=120
    depends_on:
      - api
      - redis
    networks: [ogami-net]

  mailpit:
    image: axllent/mailpit:latest
    container_name: ogami-mailpit
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025"
    networks: [ogami-net]

networks:
  ogami-net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  meilidata:
  spa_node_modules:
