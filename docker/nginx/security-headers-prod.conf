# Shared security headers (per CLAUDE.md) — PROD.
# nginx inheritance rule: a location block with ANY add_header directive
# inherits ZERO add_header from server level. Any location that adds its own
# header must `include` this file to keep the security set intact.
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
# CSP — Vite production build emits no inline scripts (verified against
# spa/dist/index.html: only an external module bundle). Dropped
# 'unsafe-inline' from script-src to close the obvious XSS hole.
# style-src keeps 'unsafe-inline' because Recharts and a handful of
# other libraries write inline style attributes on rendered elements;
# tightening that requires hash/nonce work and is a separate task.
# connect-src pins WebSockets to this host only (no bare wss:, which would
# allow exfiltration to any host). VITE_REVERB_PORT must be 443 (unset) or
# 8080 to match this CSP; other values break the websocket.
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' wss://$host wss://$host:8080; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none';" always;
