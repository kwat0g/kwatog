# ─── Ogami ERP — Production Nginx ─────────────────────────────────────────
# HTTPS on 443 (Let's Encrypt certs from the host's /etc/letsencrypt).
# Plain HTTP on 80 redirects everything to HTTPS, except .well-known/acme-challenge
# which Certbot uses for renewal.
# ──────────────────────────────────────────────────────────────────────────

# ── HTTP → HTTPS redirect, plus ACME challenge passthrough ────────────────
server {
    listen 80;
    listen [::]:80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS server ──────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ${SERVER_NAME};

    client_max_body_size 50M;

    # ── TLS ───────────────────────────────────────────────────────────────
    # Replace ${SERVER_NAME} with the actual domain at deploy time. The
    # docs/DEPLOY.md runbook uses `envsubst` during `make deploy`.
    ssl_certificate     /etc/letsencrypt/live/${SERVER_NAME}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${SERVER_NAME}/privkey.pem;

    # Mozilla Intermediate (https://ssl-config.mozilla.org/)
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            1.1.1.1 1.0.0.1 valid=300s;
    resolver_timeout    5s;

    # ── Security headers (per CLAUDE.md) ──────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' wss: https:;" always;

    # ── Compression ───────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # ── WebSocket (Laravel Reverb) ────────────────────────────────────────
    location /ws {
        proxy_pass http://reverb:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade            $http_upgrade;
        proxy_set_header Connection         "upgrade";
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_read_timeout 3600s;
    }

    # ── Laravel API + Sanctum CSRF ────────────────────────────────────────
    location ~ ^/(api|sanctum)/ {
        fastcgi_pass api:9000;
        fastcgi_index index.php;
        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
        fastcgi_param SCRIPT_NAME     /index.php;
        fastcgi_param REQUEST_URI     $request_uri;
        fastcgi_param DOCUMENT_URI    /index.php;
        fastcgi_param QUERY_STRING    $query_string;
        fastcgi_param REQUEST_METHOD  $request_method;
        fastcgi_param CONTENT_TYPE    $content_type;
        fastcgi_param CONTENT_LENGTH  $content_length;
        fastcgi_param HTTPS           on;

        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_read_timeout 60s;
    }

    # ── Storage downloads (uploaded payslips, attachments, etc.) ──────────
    # Always served via the API controller for permission enforcement; this
    # block exists only as a safety fallback for the public symlink that
    # `php artisan storage:link` creates.
    location /storage/ {
        alias /var/www/api/storage/app/public/;
        try_files $uri =404;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # ── SPA static build with client-side routing fallback ────────────────
    root /var/www/spa;
    index index.html;

    # Long-cache hashed Vite assets.
    location /assets/ {
        try_files $uri =404;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
