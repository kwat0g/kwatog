# Shared security headers (per CLAUDE.md) — DEV.
# nginx inheritance rule: a location block with ANY add_header directive
# inherits ZERO add_header from server level. Any location that adds its own
# header must `include` this file to keep the security set intact.
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
# script-src keeps 'unsafe-inline' (Vite/@vitejs/plugin-react preamble) and
# connect-src keeps localhost ws entries (HMR) — dev only, prod is strict.
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' ws: wss: http://localhost:* ws://localhost:*; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none';" always;
